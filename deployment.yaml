apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp
        image: 933747314862.dkr.ecr.ap-south-1.amazonaws.com/myapp:1
        ports:
        - containerPort: 5000
